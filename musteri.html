<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAS ANKARA - Lastik Bilgim</title>
  <meta name="theme-color" content="#cc0000">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f0f0f0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 20px; }
    .kart { background: #fff; border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); width: 100%; max-width: 480px; overflow: hidden; margin: 20px auto; }
    .header { background: #111; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #cc0000; }
    .logo { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 28px; letter-spacing: -1px; color: #fff; }
    .logo span { color: #cc0000; }
    .header-sag { text-align: right; }
    .header-tel { color: #fff; font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
    .header-adres { color: #aaa; font-size: 11px; margin-top: 2px; }
    .icerik { padding: 18px 20px; }
    .plaka-box { background: #f8f8f8; border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #cc0000; }
    .plaka { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 900; color: #111; letter-spacing: 1px; }
    .plaka-label { font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .tarih-label { font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; text-align: right; }
    .tarih { font-size: 14px; font-weight: 700; color: #333; text-align: right; }
    .musteri-box { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #eee; }
    .musteri-label { font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .musteri-isim { font-size: 20px; font-weight: 800; color: #111; margin-bottom: 4px; }
    .musteri-tel { font-size: 14px; color: #444; font-weight: 600; }
    .durum-box { border-radius: 10px; padding: 12px 16px; text-align: center; margin-bottom: 14px; }
    .durum-ikon { font-size: 24px; margin-bottom: 4px; }
    .durum-text { font-weight: 700; font-size: 15px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .kart-item { background: #f8f8f8; border-radius: 8px; padding: 10px 12px; }
    .kart-baslik { font-size: 10px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
    .kart-deger { font-size: 15px; font-weight: 800; color: #111; }
    .foto-wrap { margin-bottom: 14px; overflow-x: auto; display: flex; gap: 8px; scroll-snap-type: x mandatory; }
    .foto-wrap img { width: 100%; min-width: 100%; max-height: 220px; object-fit: cover; border-radius: 10px; scroll-snap-align: start; flex-shrink: 0; }
    .not-box { background: #fff8ec; border-left: 4px solid #e67e00; border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; }
    .not-label { font-size: 11px; color: #e67e00; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .not-text { font-size: 13px; color: #555; }
    .uyari-box { background: #fff8ec; border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; border: 1px solid #fde8c0; }
    .uyari-baslik { font-size: 12px; font-weight: 700; color: #e67e00; margin-bottom: 6px; }
    .uyari-text { font-size: 12px; color: #666; line-height: 1.5; }
    .merkez { font-size: 11px; color: #bbb; text-align: center; margin-top: 4px; }
    .maps-btn { display: flex; align-items: center; gap: 14px; background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%); border-radius: 12px; padding: 14px 18px; margin-bottom: 14px; text-decoration: none; box-shadow: 0 4px 12px rgba(26,115,232,0.3); }
    .maps-pin { width: 42px; height: 42px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
    .maps-info { flex: 1; }
    .maps-name { font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 2px; }
    .maps-adres { font-size: 11px; color: rgba(255,255,255,0.75); }
    .maps-arrow { font-size: 20px; color: rgba(255,255,255,0.8); }
    .footer { padding: 16px 20px; background: #f8f8f8; border-top: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
    .footer-logo { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 13px; color: #111; }
    .footer-sub { font-size: 10px; color: #aaa; letter-spacing: 0.1em; }
    .footer-tel { font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 800; color: #cc0000; text-decoration: none; }
    .yukleniyor { text-align: center; padding: 60px 20px; color: #aaa; }
    .hata { text-align: center; padding: 60px 20px; }
  </style>
</head>
<body>
  <div class="kart">
    <div class="header">
      <div class="logo"><span>LAS</span> ANKARA</div>
      <div class="header-sag">
        <div class="header-tel">0507 633 52 52</div>
        <div class="header-adres">Etimesgut / Ankara</div>
      </div>
    </div>
    <div class="icerik" id="icerik">
      <div class="yukleniyor">
        <div style="font-size:40px;margin-bottom:12px;">⏳</div>
        <div style="font-weight:600;color:#555;">Yükleniyor...</div>
      </div>
    </div>
    <div class="footer">
      <div>
        <div class="footer-logo">LAS ANKARA</div>
        <div class="footer-sub">PROFESSIONAL SERVICE</div>
      </div>
      <a href="tel:05076335252" class="footer-tel">0507 633 52 52</a>
    </div>
  </div>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyCpOjpC39hZG20iW5DqHz3pN13UrIXr3II",
      authDomain: "lasankarabase.firebaseapp.com",
      projectId: "lasankarabase",
      appId: "1:451616245870:web:a98503047d6eaf282afe7f"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    var FS = firebase.firestore();

    var params = new URLSearchParams(window.location.search);
    var musteriId = params.get('id') || params.get('musteri');

    function kart(baslik, deger) {
      return '<div class="kart-item"><div class="kart-baslik">' + baslik + '</div><div class="kart-deger">' + deger + '</div></div>';
    }

    function telGoster(tel) {
      if (!tel) return '';
      var t = tel.replace(/^90/, '0');
      return t.replace(/(\d{4})(\d{3})(\d{2})(\d{2})/, '$1 $2 $3 $4');
    }

    function goster(k) {
      var el = document.getElementById('icerik');
      if (!k) {
        el.innerHTML = '<div class="hata"><div style="font-size:48px;margin-bottom:12px;">🔍</div><div style="font-weight:700;color:#333;margin-bottom:8px;">Kayıt Bulunamadı</div><div style="font-size:13px;color:#888;">Bu link geçersiz veya süresi dolmuş olabilir.<br><br>Lütfen işyerimizi arayın.</div></div>';
        return;
      }

      var durum, durumRenk, durumIkon;
      if (k.teslim)       { durum = 'Teslim Edildi';      durumRenk = '#1a8a3a'; durumIkon = '✅'; }
      else if (k.montaj)  { durum = 'Montaj Tamamlandı';  durumRenk = '#1a8a3a'; durumIkon = '✅'; }
      else if (k.sira)    { durum = 'Depoda Bekliyor';     durumRenk = '#e67e00'; durumIkon = '📦'; }
      else                { durum = 'Otele Alındı';        durumRenk = '#3a6abf'; durumIkon = '🚗'; }

      var fotograflar = (k.fotolar && k.fotolar.length) ? k.fotolar : (k.foto ? [k.foto] : []);
      var fotoHtml = '';
      if (fotograflar.length > 0) {
        fotoHtml = '<div class="foto-wrap">' +
          fotograflar.map(function(f) {
            return '<img src="' + f + '" alt="Lastik">';
          }).join('') +
        '</div>';
      }

      var telStr = telGoster(k.tel);

      el.innerHTML =
        '<div class="plaka-box">' +
          '<div><div class="plaka-label">Araç Plakası</div><div class="plaka">' + (k.plaka || '-') + '</div></div>' +
          '<div><div class="tarih-label">Tarih</div><div class="tarih">' + (k.tarih || '-') + '</div></div>' +
        '</div>' +
        '<a href="https://www.google.com/maps/place/LAS+ANKARA+LAST%C4%B0K+VE+SERV%C4%B0S+H%C4%B0ZMETLER%C4%B0/@39.9735289,32.6567063,17z/data=!4m6!3m5!1s0x14d337a2011668f3:0xaf741d839bca6551" target="_blank" class="maps-btn">' +
          '<div class="maps-pin">📍</div>' +
          '<div class="maps-info"><div class="maps-name">LAS ANKARA</div><div class="maps-adres">Etimesgut, Ankara · Yol tarifi al</div></div>' +
          '<div class="maps-arrow">›</div>' +
        '</a>' +
        '<div class="musteri-box">' +
          '<div class="musteri-label">Müşteri</div>' +
          '<div class="musteri-isim">' + (k.isim || '-') + '</div>' +
          (telStr ? '<div class="musteri-tel">📱 ' + telStr + '</div>' : '') +
        '</div>' +
        '<div class="durum-box" style="background:' + durumRenk + '18;border:1.5px solid ' + durumRenk + '44;">' +
          '<div class="durum-ikon">' + durumIkon + '</div>' +
          '<div class="durum-text" style="color:' + durumRenk + ';">' + durum + '</div>' +
        '</div>' +
        fotoHtml +
        '<div class="grid">' +
          kart('Lastik Ebatı', k.ebat || '-') +
          kart('Marka', k.marka || '-') +
          kart('Adet', (k.adet || 4) + ' adet') +
          kart('Lastik Tipi', k.tip || '-') +
          kart('Dönem', k.donem || '-') +
          kart('Giriş Tarihi', k.tarih || '-') +
          (k.sira ? kart('Depo Sırası', k.sira) : '') +
          (k.uretim ? kart('Üretim Yılı', k.uretim) : '') +
        '</div>' +
        (k.not ? '<div class="not-box"><div class="not-label">Not</div><div class="not-text">' + k.not + '</div></div>' : '') +
        '<div class="uyari-box">' +
          '<div class="uyari-baslik">⚠️ ÖNEMLİ UYARI</div>' +
          '<div class="uyari-text">Lastik saklama ücreti peşin alınır. Teslim tarihinden itibaren <strong>1 yıl</strong> içinde alınmayan lastikler geri dönüşüm için hurdaya ayrılır. Hak talep edilemez.</div>' +
        '</div>' +
        '<div class="merkez">LAS ANKARA Lastik Oteli</div>';
    }

    if (!musteriId) {
      goster(null);
    } else {
      FS.collection('otel').doc(musteriId).get().then(function(doc) {
        if (doc.exists) {
          goster(doc.data());
        } else {
          return FS.collection('otel').where('id', '==', musteriId).limit(1).get().then(function(snap) {
            if (!snap.empty) { goster(snap.docs[0].data()); }
            else { goster(null); }
          });
        }
      }).catch(function(e) { console.error(e); goster(null); });
    }
  </script>
</body>
</html>
