<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yönlendiriliyor...</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      color: #fff;
    }

    .container {
      text-align: center;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .logo span {
      color: #e60000;
    }

    .text {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 20px;
    }

    .loader {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #e60000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">OTO<span>SAKLA</span></div>
    <div class="text">Yeni sisteme yönlendiriliyorsunuz...</div>
    <div class="loader"></div>
  </div>

  <script>
    const id = new URLSearchParams(window.location.search).get("id");

    const target = id
      ? `https://otosakla.com/legacy/musteri?id=${encodeURIComponent(id)}`
      : `https://otosakla.com`;

    setTimeout(() => {
      window.location.replace(target);
    }, 600);
  </script>
</body>
</html>
